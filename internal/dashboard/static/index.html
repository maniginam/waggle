<!-- Toast notifications -->
<div class="toast-container" id="toast-container"></div>

<!-- Overlay backdrop -->
<div class="overlay-backdrop" id="overlay" onclick="closePanel()"></div>

<!-- Slide-out panel -->
<div class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-header-left">
      <div>
        <div class="panel-title" id="panel-title"></div>
        <div class="panel-subtitle" id="panel-subtitle"></div>
      </div>
    </div>
    <button class="panel-close" onclick="closePanel()">&times;</button>
  </div>
  <div id="panel-content"></div>
</div>

<script>
const STATUSES = ['backlog','ready','in_progress','review','blocked','done'];
const STATUS_LABELS = {backlog:'Backlog',ready:'Ready',in_progress:'In Progress',review:'Review',blocked:'Blocked',done:'Done'};
const PRIORITY_ORDER = {critical:0,high:1,medium:2,low:3};

let tasks = [];
let agents = [];
let stats = {};
let projects = [];
let selectedProject = '';
let currentView = localStorage.getItem('waggle_view') || 'overview';
let currentPanel = null; // {type:'task',id:'...'} or {type:'chat',agent:'...'}
let searchQuery = '';
let draggedTaskId = null;
let filterPriority = '';
let filterAssignee = '';
let filterType = '';
let usageData = null;
let collapsedColumns = new Set(JSON.parse(localStorage.getItem('waggle_collapsed') || '[]'));
let navCollapsed = localStorage.getItem('waggle_nav_collapsed') === 'true';
let boardSort = localStorage.getItem('waggle_sort') || 'priority'; // priority, deadline, newest, oldest

// ── BOARD PROGRESS ──

const STATUS_COLORS = {backlog:'var(--text-dim)',ready:'var(--blue)',in_progress:'var(--amber)',review:'var(--purple)',blocked:'var(--red)',done:'var(--green)'};

function renderBoardProgress() {
  const el = document.getElementById('board-progress');
  if (!el) return;
  let ft = selectedProject === 'none' ? tasks.filter(t => !t.project_id) :
    selectedProject ? tasks.filter(t => t.project_id === selectedProject) : tasks;
  const total = ft.length || 1;
  const counts = {};
  STATUSES.forEach(s => counts[s] = ft.filter(t => t.status === s).length);
  el.innerHTML = `
    <div class="board-progress-bar">
      ${STATUSES.map(s => counts[s] > 0 ? `<div class="board-progress-segment" style="width:${(counts[s]/total*100).toFixed(1)}%;background:${STATUS_COLORS[s]}"></div>` : '').join('')}
    </div>
    <div class="board-progress-labels">
      ${STATUSES.filter(s => counts[s] > 0).map(s => `<span class="board-progress-label"><span class="board-progress-dot" style="background:${STATUS_COLORS[s]}"></span>${counts[s]} ${STATUS_LABELS[s].toLowerCase()}</span>`).join('')}
    </div>
  `;
}

// ── BOARD RENDER ──

function renderBoard() {
  renderBoardProgress();
  const board = document.getElementById('board');
  board.innerHTML = '';
  let filteredTasks = selectedProject === 'none' ? tasks.filter(t => !t.project_id) :
    selectedProject ? tasks.filter(t => t.project_id === selectedProject) : tasks;
  // Apply search filter
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    filteredTasks = filteredTasks.filter(t =>
      (t.title||'').toLowerCase().includes(q) ||
      (t.id||'').toLowerCase().includes(q) ||
      (t.assignee||'').toLowerCase().includes(q) ||
      (t.tags||[]).some(tag => tag.toLowerCase().includes(q)) ||
      (t.description||'').toLowerCase().includes(q)
    );
  }
  // Apply filters
  if (filterPriority) filteredTasks = filteredTasks.filter(t => t.priority === filterPriority);
  if (filterAssignee) {
    if (filterAssignee === '_none') filteredTasks = filteredTasks.filter(t => !t.assignee);
    else filteredTasks = filteredTasks.filter(t => t.assignee === filterAssignee);
  }
  if (filterType) filteredTasks = filteredTasks.filter(t => (t.task_type||'task') === filterType);
  // Build lookup maps to avoid O(n²) in renderCard
  const childrenByParent = {};
  const tasksById = {};
  tasks.forEach(t => {
    tasksById[t.id] = t;
    if (t.parent_id) {
      (childrenByParent[t.parent_id] = childrenByParent[t.parent_id] || []).push(t);
    }
  });

  for (const status of STATUSES) {
    const col = document.createElement('div');
    col.className = 'column';
    col.dataset.status = status;
    const colTasks = filteredTasks.filter(t => t.status === status)
      .sort((a,b) => {
        if (boardSort === 'deadline') {
          const da = a.deadline ? new Date(a.deadline).getTime() : Infinity;
          const db = b.deadline ? new Date(b.deadline).getTime() : Infinity;
          return da - db || (PRIORITY_ORDER[a.priority]||4) - (PRIORITY_ORDER[b.priority]||4);
        }
        if (boardSort === 'newest') return new Date(b.created_at||0) - new Date(a.created_at||0);
        if (boardSort === 'oldest') return new Date(a.created_at||0) - new Date(b.created_at||0);
        return (PRIORITY_ORDER[a.priority]||4) - (PRIORITY_ORDER[b.priority]||4);
      });
    const isCollapsed = collapsedColumns.has(status);
    if (isCollapsed) col.classList.add('collapsed');
    const collapseBtn = `<button class="column-collapse-btn" onclick="event.stopPropagation();toggleColumn('${status}')">${isCollapsed ? '\u25B6' : '\u25C0'}</button>`;
    col.innerHTML = `
      <div class="column-header" ${isCollapsed ? `onclick="toggleColumn('${status}')"` : ''}>
        <span class="column-title">${STATUS_LABELS[status]}</span>
        <span class="column-count">${colTasks.length}</span>
        <button class="column-add" data-add-status="${status}" title="New task in ${STATUS_LABELS[status]}">+</button>
        ${collapseBtn}
      </div>
      <div class="column-body" data-status="${status}">
        ${colTasks.length === 0 ? '<div class="empty-state"><div class="empty-hex"></div></div>' :
          colTasks.map(t => renderCard(t, childrenByParent, tasksById)).join('')}
      </div>
    `;
    board.appendChild(col);
  }
  // Column add buttons
  board.querySelectorAll('.column-add[data-add-status]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      quickCreateTask(btn.dataset.addStatus);
    });
  });
  // Attach click handlers
  board.querySelectorAll('.card-quick-claim[data-claim-id]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      quickClaim(btn.dataset.claimId);
    });
  });
  board.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (card.classList.contains('dragging')) return;
      openTaskPanel(card.dataset.id);
    });
    // Drag and drop
    card.setAttribute('draggable', 'true');
    card.addEventListener('dragstart', (e) => {
      draggedTaskId = card.dataset.id;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', card.dataset.id);
    });
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      draggedTaskId = null;
      board.querySelectorAll('.column-body').forEach(cb => cb.classList.remove('drag-over'));
    });
  });
  // Drop targets on column bodies
  board.querySelectorAll('.column-body').forEach(colBody => {
    colBody.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      colBody.classList.add('drag-over');
    });
    colBody.addEventListener('dragleave', (e) => {
      if (!colBody.contains(e.relatedTarget)) {
        colBody.classList.remove('drag-over');
      }
    });
    colBody.addEventListener('drop', async (e) => {
      e.preventDefault();
      colBody.classList.remove('drag-over');
      const taskId = e.dataTransfer.getData('text/plain');
      const newStatus = colBody.dataset.status;
      if (!taskId || !newStatus) return;
      const task = tasks.find(t => t.id === taskId);
      if (task && task.status !== newStatus) {
        await fetch(`/api/tasks/${taskId}`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({status: newStatus}),
        });
        await fetchAll();
        if (currentPanel && currentPanel.type === 'task' && currentPanel.id === taskId) {
          openTaskPanel(taskId);
        }
      }
    });
  });
}

function renderCard(t, childrenByParent, tasksById) {
  const tags = (t.tags||[]).map(tag => `<span class="tag">${esc(tag)}</span>`).join('');
  const sel = currentPanel && currentPanel.type === 'task' && currentPanel.id === t.id ? ' selected' : '';
  const taskType = t.task_type || 'task';
  const showType = taskType !== 'task';
  const proj = t.project_id ? projects.find(p => p.id === t.project_id) : null;
  const projBadge = proj
    ? `<span class="project-badge assigned">${esc(proj.name)}</span>`
    : (projects.length > 0 ? `<span class="project-badge unassigned">no project</span>` : '');

  // Epic progress: count children done vs total (using prebuilt map)
  const children = (childrenByParent || {})[t.id] || [];
  const childDone = children.filter(c => c.status === 'done').length;
  const childTotal = children.length;
  const progressHtml = childTotal > 0 ? `
    <div class="card-progress">
      <div class="card-progress-bar"><div class="card-progress-fill" style="width:${Math.round(childDone/childTotal*100)}%"></div></div>
      <span class="card-progress-label">${childDone}/${childTotal}</span>
    </div>` : '';

  // Blocked deps: check if this task depends on unfinished tasks (using prebuilt map)
  const blockedDeps = (t.depends_on||[]).filter(depId => {
    const dep = (tasksById || {})[depId];
    return dep && dep.status !== 'done';
  });
  const blockedHtml = blockedDeps.length > 0 && t.status !== 'done'
    ? `<div class="card-blocked-deps">${blockedDeps.length} unresolved dep${blockedDeps.length > 1 ? 's' : ''}</div>` : '';

  // Quick claim button (only if unassigned and agents exist)
  const claimBtn = !t.assignee && agents.length > 0 && t.status !== 'done'
    ? `<button class="card-quick-claim" data-claim-id="${esc(t.id)}" title="Assign to agent">claim</button>` : '';

  // Tooltip with description
  const tooltip = t.description ? `<div class="card-tooltip">${esc(t.description)}</div>` : '';

  // Deadline indicator
  let deadlineHtml = '';
  let overdueClass = '';
  if (t.deadline && t.status !== 'done') {
    const dl = new Date(t.deadline);
    const now = new Date();
    const daysLeft = Math.ceil((dl - now) / 86400000);
    if (daysLeft < 0) {
      deadlineHtml = `<span class="card-deadline overdue">${Math.abs(daysLeft)}d overdue</span>`;
      overdueClass = ' card-overdue';
    } else if (daysLeft <= 2) {
      deadlineHtml = `<span class="card-deadline urgent">${daysLeft === 0 ? 'today' : daysLeft + 'd left'}</span>`;
    } else if (daysLeft <= 7) {
      deadlineHtml = `<span class="card-deadline soon">${daysLeft}d left</span>`;
    }
  }

  return `
    <div class="card${sel}${overdueClass}" data-id="${esc(t.id)}">
      ${claimBtn}
      <div class="card-id">
        <span>${showType ? `<span class="type-badge type-${taskType}">${taskType}</span> ` : ''}${esc(t.id)}</span>
        ${projBadge}
      </div>
      <div class="card-title">${esc(t.title)}</div>
      <div class="card-meta">
        <span class="priority-badge priority-${t.priority}">${t.priority}</span>
        ${t.assignee ? `<span class="card-assignee">${esc(t.assignee)}</span>` : ''}
        ${deadlineHtml}
        ${tags ? `<div class="card-tags">${tags}</div>` : ''}
      </div>
      ${progressHtml}
      ${blockedHtml}
      ${tooltip}
    </div>
  `;
}

function agentIsStale(a) {
  if (a.status === 'disconnected') return false;
  const lastSeen = new Date(a.last_seen);
  const ageMs = Date.now() - lastSeen.getTime();
  return ageMs > 3 * 60 * 1000; // stale if no activity for 3+ minutes
}

function renderAgents() {
  const el = document.getElementById('agent-list');
  // Filter agents by project when viewing a project board
  let filtered = agents;
  if (currentView !== 'overview' && currentView !== 'none') {
    filtered = agents.filter(a => a.project_id === currentView || !a.project_id || a.type === 'alpha' || a.type === 'leader');
  }
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state"><p>No agents connected</p></div>';
    return;
  }
  // Sort: alpha first, then leaders, then others; disconnected last
  const sorted = [...filtered].sort((a, b) => {
    const rank = t => t.type === 'alpha' ? 0 : t.type === 'leader' ? 1 : t.status === 'disconnected' ? 9 : 2;
    return rank(a) - rank(b);
  });
  el.innerHTML = sorted.map(a => {
    const sel = currentPanel && currentPanel.type === 'agent' && currentPanel.agent === a.name ? ' selected' : '';
    const stale = agentIsStale(a);
    const roleColor = {alpha:'var(--amber)',leader:'var(--purple)',subagent:'var(--cyan)',custom:'var(--text-dim)'}[a.type] || 'var(--text-dim)';
    const lastSeenStr = a.last_seen ? timeSince(new Date(a.last_seen)) : '';
    const taskCount = tasks.filter(t => t.assignee === a.name && t.status !== 'done').length;
    const agentProject = a.project_id ? projects.find(p => p.id === a.project_id) : null;
    return `
    <div class="agent-row${sel}${stale ? ' agent-stale' : ''}" data-agent="${esc(a.name)}">
      <div class="agent-status-dot ${a.status}"></div>
      <div class="agent-info">
        <div class="agent-name">${esc(a.name)} <span style="font-size:0.55rem;color:${roleColor};font-weight:700;text-transform:uppercase;letter-spacing:0.5px">${a.type}</span></div>
        <div class="agent-type" style="color:var(--text-dim)">${a.current_task ? esc(a.current_task) : (agentProject ? esc(agentProject.name) : lastSeenStr)}</div>
      </div>
      <span class="agent-workload${taskCount > 0 ? ' has-tasks' : ''}" title="${taskCount} assigned task${taskCount !== 1 ? 's' : ''}">${taskCount}</span>
      <div class="agent-actions">
        ${stale ? `<button class="poke-btn" onclick="pokeAgent(event,'${esc(a.name)}')">poke</button>` : ''}
        <button class="msg-btn" onclick="openAgentPanel(event,'${esc(a.name)}')">&#9993;</button>
      </div>
    </div>`;
  }).join('');
  el.querySelectorAll('.agent-row').forEach(row => {
    row.addEventListener('click', (e) => {
      if (e.target.closest('button')) return;
      openAgentPanel(e, row.dataset.agent);
    });
  });
}

function timeSince(date) {
  const secs = Math.floor((Date.now() - date.getTime()) / 1000);
  if (secs < 60) return `${secs}s ago`;
  if (secs < 3600) return `${Math.floor(secs/60)}m ago`;
  if (secs < 86400) return `${Math.floor(secs/3600)}h ago`;
  return `${Math.floor(secs/86400)}d ago`;
}

function renderStats() {
  const s = stats;
  if (!s.total_tasks && s.total_tasks !== 0) return;

  // Compute project-scoped stats if a project is selected
  let ready, inProg, done, blocked, total;
  const scopedTasks = selectedProject === 'none' ? tasks.filter(t => !t.project_id) :
    selectedProject ? tasks.filter(t => t.project_id === selectedProject) : tasks;
  if (selectedProject) {
    ready = scopedTasks.filter(t => t.status === 'ready').length;
    inProg = scopedTasks.filter(t => t.status === 'in_progress').length;
    done = scopedTasks.filter(t => t.status === 'done').length;
    blocked = scopedTasks.filter(t => t.status === 'blocked').length;
    total = scopedTasks.length || 1;
  } else {
    const byStatus = s.tasks_by_status || {};
    ready = byStatus.ready || 0;
    inProg = byStatus.in_progress || 0;
    done = byStatus.done || 0;
    blocked = byStatus.blocked || 0;
    total = s.total_tasks || 1;
  }

  const taskCount = selectedProject ? scopedTasks.length : s.total_tasks;
  const scopeLabel = selectedProject ? (selectedProject === 'none' ? 'unassigned' : (projects.find(p=>p.id===selectedProject)||{}).name || '') : '';
  const costStr = usageData && usageData.total && usageData.total.cost_usd > 0 ? `<div class="header-stat"><span class="val" style="color:var(--green)">$${usageData.total.cost_usd.toFixed(2)}</span> spent</div>` : '';
  document.getElementById('header-stats').innerHTML = `
    <div class="header-stat"><span class="val">${taskCount}</span> tasks${scopeLabel ? ` <span style="color:var(--amber);font-size:0.7rem">${esc(scopeLabel)}</span>` : ''}</div>
    <div class="header-stat"><span class="val">${s.total_agents}</span> agents</div>
    ${costStr}
    <div class="header-stat"><div class="pulse-dot"></div> live</div>
  `;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-cell">
      <div class="label">Ready</div>
      <div class="value blue">${ready}</div>
      <div class="stat-bar-visual"><div class="stat-bar-segment" style="width:100%;background:var(--blue);opacity:${ready?0.6:0.1}"></div></div>
    </div>
    <div class="stat-cell">
      <div class="label">In Progress</div>
      <div class="value amber">${inProg}</div>
      <div class="stat-bar-visual"><div class="stat-bar-segment" style="width:100%;background:var(--amber);opacity:${inProg?0.6:0.1}"></div></div>
    </div>
    <div class="stat-cell">
      <div class="label">Blocked</div>
      <div class="value" style="color:var(--red)">${blocked}</div>
      <div class="stat-bar-visual"><div class="stat-bar-segment" style="width:100%;background:var(--red);opacity:${blocked?0.6:0.1}"></div></div>
    </div>
    <div class="stat-cell">
      <div class="label">Done</div>
      <div class="value green">${done}</div>
      <div class="stat-bar-visual"><div class="stat-bar-segment" style="width:${Math.round(done/total*100)}%;background:var(--green);opacity:0.6"></div></div>
    </div>
    <div class="stat-cell">
      <div class="label">Completion</div>
      <div class="value">${Math.round(done/total*100)}<span style="font-size:0.8rem;color:var(--text-dim)">%</span></div>
      <div class="stat-bar-visual">
        <div class="stat-bar-segment" style="width:${Math.round(done/total*100)}%;background:var(--amber)"></div>
        <div class="stat-bar-segment" style="flex:1;background:var(--bg-elevated)"></div>
      </div>
    </div>
  `;
}

function renderUsage() {
  const bar = document.getElementById('usage-bar');
  if (!usageData || !usageData.total) {
    bar.innerHTML = '';
    bar.style.display = 'none';
    return;
  }
  bar.style.display = '';
  const total = usageData.total;
  const byAgent = usageData.by_agent || [];
  const maxCost = byAgent.length > 0 ? Math.max(...byAgent.map(a => a.cost_usd)) : 1;

  bar.innerHTML = `
    <div class="usage-cell" style="flex:0 0 auto">
      <div class="usage-info">
        <div class="usage-label">Total Cost</div>
        <div class="usage-value cost">$${total.cost_usd.toFixed(2)}</div>
      </div>
    </div>
    <div class="usage-cell" style="flex:0 0 auto">
      <div class="usage-info">
        <div class="usage-label">Input Tokens</div>
        <div class="usage-value tokens">${fmtTokens(total.input_tokens)}</div>
      </div>
    </div>
    <div class="usage-cell" style="flex:0 0 auto">
      <div class="usage-info">
        <div class="usage-label">Output Tokens</div>
        <div class="usage-value tokens">${fmtTokens(total.output_tokens)}</div>
      </div>
    </div>
    <div class="usage-cell" style="flex:1;overflow-x:auto">
      <div style="display:flex;gap:8px;flex-wrap:nowrap;width:100%">
        ${byAgent.map(a => `
          <div class="usage-agent-row" style="flex:0 0 auto;min-width:140px">
            <div style="flex:1;min-width:0">
              <div class="usage-agent-name" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(a.agent_name)}</div>
              <div class="usage-agent-tokens">${fmtTokens(a.total_tokens)} tok</div>
            </div>
            <div style="text-align:right">
              <div class="usage-agent-cost">$${a.cost_usd.toFixed(2)}</div>
              <div class="usage-agent-bar"><div class="usage-agent-bar-fill" style="width:${Math.round(a.cost_usd/maxCost*100)}%"></div></div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function fmtTokens(n) {
  if (!n) return '0';
  if (n >= 1_000_000) return (n/1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return (n/1_000).toFixed(1) + 'K';
  return n.toString();
}

function addEvent(evt) {
  const feed = document.getElementById('event-feed');
  const row = document.createElement('div');
  row.className = 'event-row';
  const time = evt.timestamp ? new Date(evt.timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
  const typeLabel = (evt.type||'event').replace(/_/g,' ');
  const typeColors = {
    task_created:'var(--green)',task_completed:'var(--green)',task_claimed:'var(--amber)',
    task_updated:'var(--blue)',task_deleted:'var(--red)',task_unclaimed:'var(--text-dim)',
    agent_registered:'var(--cyan)',agent_disconnected:'var(--red)',message_sent:'var(--purple)',
  };
  const dotColor = typeColors[evt.type] || 'var(--text-dim)';
  let detail = '';
  if (evt.agent_id) detail += `<span style="color:var(--cyan)">${esc(evt.agent_id)}</span>`;
  if (evt.task_id) detail += (detail ? ' ' : '') + `<span style="color:var(--text-secondary)">${esc(evt.task_id)}</span>`;
  row.innerHTML = `<span class="event-time">${time}</span><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${dotColor};margin-right:4px;vertical-align:middle"></span><span class="event-type">${typeLabel}</span> ${detail}`;
  // Make task events clickable
  if (evt.task_id) {
    row.style.cursor = 'pointer';
    row.addEventListener('click', () => openTaskPanel(evt.task_id));
  }
  feed.insertBefore(row, feed.firstChild);
  while (feed.children.length > 50) feed.removeChild(feed.lastChild);
}

// ── TASK DETAIL PANEL ──

async function openTaskPanel(taskId, defaultTab) {
  defaultTab = defaultTab || 'details';
  currentPanel = {type:'task', id:taskId};
  const panel = document.getElementById('panel');
  const overlay = document.getElementById('overlay');

  const task = tasks.find(t => t.id === taskId);
  if (!task) return;

  const taskType = task.task_type || 'task';
  const proj = task.project_id ? projects.find(p => p.id === task.project_id) : null;
  document.getElementById('panel-title').innerHTML = `<span class="editable-val" onclick="editTitle('${esc(taskId)}')" title="Click to edit">${esc(task.title)}</span>`;
  document.getElementById('panel-subtitle').textContent = `${taskType} · ${task.id} · ${task.status} · ${task.priority}${proj ? ' · ' + proj.name : ''}`;

  // Fetch comments, deps, history, subtasks in parallel
  const [comments, deps, history, subtaskData] = await Promise.all([
    fetch(`/api/tasks/${taskId}/comments`).then(r => r.json()).catch(() => []),
    fetch(`/api/tasks/${taskId}/deps`).then(r => r.json()).catch(() => ({depends_on:[],blocking:[]})),
    fetch(`/api/tasks/${taskId}/history`).then(r => r.json()).catch(() => []),
    fetch(`/api/tasks/${taskId}/subtasks`).then(r => r.json()).catch(() => ({subtasks:[],progress:{done:0,total:0}})),
  ]);
  const subtasks = subtaskData.subtasks || [];
  const progress = subtaskData.progress || {done:0,total:0};

  const content = document.getElementById('panel-content');
  content.innerHTML = `
    <div class="panel-tabs">
      <div class="panel-tab${defaultTab==='details'?' active':''}" data-tab="details">Details</div>
      <div class="panel-tab${defaultTab==='comments'?' active':''}" data-tab="comments">Comments (${comments.length})</div>
      <div class="panel-tab${defaultTab==='history'?' active':''}" data-tab="history">History (${history.length})</div>
    </div>
    <div class="panel-body" id="tab-details"${defaultTab!=='details'?' style="display:none"':''}>
      <div class="detail-section">
        <div class="detail-label">Description <span class="edit-hint" onclick="editDescription('${esc(taskId)}')">${task.description ? 'edit' : 'add'}</span></div>
        <div class="detail-value" id="desc-display">${task.description ? esc(task.description) : '<span style="color:var(--text-dim);cursor:pointer" onclick="editDescription(\''+esc(taskId)+'\')">Click to add description...</span>'}</div>
        <div id="desc-edit" style="display:none">
          <textarea class="form-input" id="desc-textarea" style="width:100%;min-height:80px;font-size:0.8rem">${esc(task.description||'')}</textarea>
          <div style="display:flex;gap:6px;margin-top:6px;justify-content:flex-end">
            <button class="btn-ghost btn-sm" onclick="cancelEditDescription()">Cancel</button>
            <button class="btn btn-sm" onclick="saveDescription('${esc(taskId)}')">Save</button>
          </div>
        </div>
      </div>
      <div class="detail-row">
        <div class="detail-field"><div class="label">Status</div><div class="val"><span class="priority-badge priority-${statusColor(task.status)}">${task.status}</span></div></div>
        <div class="detail-field"><div class="label">Priority</div><div class="val"><span class="priority-badge priority-${task.priority}">${task.priority}</span></div></div>
        <div class="detail-field"><div class="label">Assignee</div><div class="val"><span class="editable-val" onclick="editAssignee('${taskId}','${task.assignee||''}')" title="Click to edit">${task.assignee ? esc(task.assignee) : '<span style="color:var(--text-dim)">unassigned (click)</span>'}</span></div></div>
      </div>
      ${task.estimate || task.deadline ? `<div class="detail-row">
        ${task.estimate ? `<div class="detail-field"><div class="label">Estimate</div><div class="val">${esc(task.estimate)}</div></div>` : ''}
        ${task.deadline ? (() => {
          const dl = new Date(task.deadline);
          const now = new Date();
          const daysLeft = Math.ceil((dl - now) / 86400000);
          const dateStr = dl.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
          let urgency = '';
          if (task.status !== 'done') {
            if (daysLeft < 0) urgency = `<span style="color:var(--red);font-weight:600"> (${Math.abs(daysLeft)}d overdue)</span>`;
            else if (daysLeft <= 2) urgency = `<span style="color:var(--amber);font-weight:600"> (${daysLeft === 0 ? 'today!' : daysLeft + 'd left'})</span>`;
            else if (daysLeft <= 7) urgency = `<span style="color:var(--text-dim)"> (${daysLeft}d left)</span>`;
          }
          return `<div class="detail-field"><div class="label">Deadline</div><div class="val">${dateStr}${urgency}</div></div>`;
        })() : ''}
      </div>` : ''}
      <div class="detail-section">
        <div class="detail-label">Tags <span class="edit-hint" onclick="addTag('${esc(taskId)}')">+ add</span></div>
        <div class="card-tags">
          ${(task.tags||[]).map(t => `<span class="tag tag-removable" onclick="removeTag('${esc(taskId)}','${esc(t)}')">${esc(t)} &times;</span>`).join(' ')}
          ${(task.tags||[]).length === 0 ? '<span style="color:var(--text-dim);font-size:0.75rem;cursor:pointer" onclick="addTag(\''+esc(taskId)+'\')">No tags — click + to add</span>' : ''}
        </div>
      </div>
      ${(task.criteria||[]).length ? `<div class="detail-section"><div class="detail-label">Acceptance Criteria</div>${(task.criteria||[]).map(c => `<div style="color:var(--text-secondary);font-size:0.8rem;padding:3px 0">&#x2022; ${esc(c)}</div>`).join('')}</div>` : ''}
      ${(deps.depends_on||[]).length ? `<div class="detail-section"><div class="detail-label">Depends On</div><div class="detail-deps">${(deps.depends_on||[]).map(d => depRow(d)).join('')}</div></div>` : ''}
      ${(deps.blocking||[]).length ? `<div class="detail-section"><div class="detail-label">Blocking</div><div class="detail-deps">${(deps.blocking||[]).map(d => depRow(d)).join('')}</div></div>` : ''}
      <div class="detail-section">
        <div class="detail-label">Project</div>
        <div class="detail-value">
          <span class="editable-val" onclick="editProject('${taskId}','${task.project_id||''}')" title="Click to change project">
            ${proj ? `<span style="color:var(--amber)">${esc(proj.name)}</span>` : '<span style="color:var(--text-dim)">No project (click to assign)</span>'}
          </span>
          ${proj && proj.description ? `<div style="color:var(--text-dim);font-size:0.8rem;margin-top:4px">${esc(proj.description)}</div>` : ''}
        </div>
      </div>
      ${task.parent_id ? `<div class="detail-section"><div class="detail-label">Parent</div><div class="detail-deps">${depRow(tasks.find(t=>t.id===task.parent_id)||{id:task.parent_id,title:'(unknown)',status:'backlog'})}</div></div>` : ''}
      ${subtasks.length ? `<div class="detail-section"><div class="detail-label">Children <span style="color:var(--green);font-size:0.65rem">${progress.done}/${progress.total} done</span></div><div class="detail-deps">${subtasks.map(d => depRow(d)).join('')}</div></div>` : ''}
      <div class="action-bar">
        <div class="detail-label" style="width:100%;margin-bottom:4px">Move to</div>
        ${STATUSES.filter(s => s !== task.status).map(s =>
          `<button class="btn-sm" onclick="updateTaskStatus('${taskId}','${s}')">${STATUS_LABELS[s]}</button>`
        ).join('')}
      </div>
      <div class="action-bar" style="border-top:none;padding-top:8px">
        <div class="detail-label" style="width:100%;margin-bottom:4px">Priority</div>
        ${['critical','high','medium','low'].filter(p => p !== task.priority).map(p =>
          `<button class="btn-sm" onclick="updateTaskPriority('${taskId}','${p}')"><span class="priority-badge priority-${p}" style="font-size:0.6rem">${p}</span></button>`
        ).join('')}
      </div>
      <div class="action-bar" style="border-top:none;padding-top:8px">
        <button class="btn-sm" onclick="duplicateTask('${taskId}')">Duplicate</button>
        <button class="btn-sm danger" onclick="deleteTask('${taskId}')">Delete task</button>
      </div>
    </div>
    <div class="panel-body" id="tab-comments"${defaultTab!=='comments'?' style="display:none"':''}>
      <div class="comment-list">
        ${comments.length === 0 ? '<div class="empty-state"><p>No comments yet</p></div>' :
          comments.map(c => `
            <div class="comment">
              <div class="comment-header">
                <span class="comment-author">${esc(c.author)}</span>
                <span class="comment-time">${new Date(c.created_at).toLocaleString()}</span>
              </div>
              <div class="comment-body">${esc(c.body)}</div>
            </div>
          `).join('')}
      </div>
      <div class="comment-form">
        <input class="comment-input" id="comment-input" placeholder="Add a comment..." onkeydown="if(event.key==='Enter')addComment()">
        <button class="btn" onclick="addComment()">Post</button>
      </div>
    </div>
    <div class="panel-body" id="tab-history"${defaultTab!=='history'?' style="display:none"':''}>
      ${history.length === 0 ? '<div class="empty-state"><p>No history</p></div>' :
        history.map(h => `
          <div style="padding:6px 0;border-bottom:1px solid var(--border-subtle);font-size:0.8rem">
            <span style="color:var(--text-dim);font-size:0.65rem;float:right">${new Date(h.timestamp).toLocaleString()}</span>
            <span style="color:var(--amber)">${(h.type||'').replace(/_/g,' ')}</span>
            ${h.agent_id ? `<span style="color:var(--cyan)"> ${esc(h.agent_id)}</span>` : ''}
          </div>
        `).join('')}
    </div>
  `;

  // Tab switching
  content.querySelectorAll('.panel-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      content.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      ['details','comments','history'].forEach(name => {
        const el = document.getElementById('tab-' + name);
        if (el) el.style.display = tab.dataset.tab === name ? '' : 'none';
      });
    });
  });

  // Dep row clicks
  content.querySelectorAll('.dep-row').forEach(row => {
    row.addEventListener('click', () => openTaskPanel(row.dataset.id));
  });

  overlay.classList.add('open');
  panel.classList.add('open');
  renderBoard();
  renderAgents();
}

function depRow(d) {
  return `<div class="dep-row" data-id="${d.id}"><div class="dep-status ${d.status}"></div><span class="dep-id">${d.id}</span><span class="dep-title">${esc(d.title)}</span></div>`;
}

function statusColor(status) {
  const map = {ready:'medium',in_progress:'high',done:'low',blocked:'critical',review:'medium',backlog:'low'};
  return map[status] || 'low';
}

async function addComment() {
  if (!currentPanel || currentPanel.type !== 'task') return;
  const input = document.getElementById('comment-input');
  const body = input.value.trim();
  if (!body) return;
  input.value = '';
  await fetch(`/api/tasks/${currentPanel.id}/comments`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({author: 'dashboard', body}),
  });
  openTaskPanel(currentPanel.id, 'comments');
}

// ── AGENT PANEL ──

async function openAgentPanel(evtOrNull, agentName) {
  if (evtOrNull && evtOrNull.stopPropagation) evtOrNull.stopPropagation();
  currentPanel = {type:'agent', agent:agentName};
  const panel = document.getElementById('panel');
  const overlay = document.getElementById('overlay');
  const agent = agents.find(a => a.name === agentName);

  const roleColor = agent ? ({alpha:'var(--amber)',leader:'var(--purple)',subagent:'var(--cyan)',custom:'var(--text-dim)'}[agent.type] || 'var(--text-dim)') : 'var(--text-dim)';
  const stale = agent && agentIsStale(agent);

  document.getElementById('panel-title').innerHTML = `${esc(agentName)} <span style="font-size:0.65rem;color:${roleColor};font-weight:700;text-transform:uppercase">${agent ? agent.type : ''}</span>`;

  const content = document.getElementById('panel-content');
  content.innerHTML = `
    <div class="panel-tabs">
      <div class="panel-tab active" data-tab="prompt">Prompt</div>
      <div class="panel-tab" data-tab="messages">Messages</div>
    </div>
    <div id="agent-tab-prompt">
      <div class="agent-detail-panel">
        ${agent ? `
        <div class="agent-detail-row">
          <div class="agent-detail-field"><div class="label">Status</div><div class="val"><span class="agent-status-dot ${agent.status}" style="display:inline-block;margin-right:6px"></span>${agent.status}</div></div>
          <div class="agent-detail-field"><div class="label">Last Seen</div><div class="val">${agent.last_seen ? timeSince(new Date(agent.last_seen)) : 'unknown'}</div></div>
        </div>
        ${agent.current_task ? `<div class="agent-detail-row"><div class="agent-detail-field"><div class="label">Current Task</div><div class="val" style="color:var(--amber)">${esc(agent.current_task)}</div></div></div>` : ''}
        <div class="agent-detail-row">
          <div class="agent-detail-field">
            <div class="label">Project Team</div>
            <select class="form-input" style="font-size:0.8rem;padding:5px 8px" onchange="assignAgentProject('${esc(agentName)}', this.value)">
              <option value=""${!agent.project_id ? ' selected' : ''}>No project (shared)</option>
              ${projects.map(p => `<option value="${esc(p.id)}"${agent.project_id === p.id ? ' selected' : ''}>${esc(p.name)}</option>`).join('')}

          </div>

async function loadChatMessages(agentName) {
  const container = document.getElementById('chat-messages');
  if (!container) return;

  // Load messages sent TO this agent (from dashboard) and FROM this agent
  const [toAgent, fromAgent] = await Promise.all([
    fetch(`/api/messages?to=${encodeURIComponent(agentName)}&limit=50`).then(r => r.json()).catch(() => []),
    fetch(`/api/messages?to=dashboard&limit=50`).then(r => r.json()).catch(() => []),
  ]);

  // Merge, filter, and sort by time
  const allMsgs = [
    ...toAgent.filter(m => m.from === 'dashboard').map(m => ({...m, dir: 'from-me'})),
    ...toAgent.filter(m => m.from === agentName).map(m => ({...m, dir: 'from-them'})),
    ...fromAgent.filter(m => m.from === agentName).map(m => ({...m, dir: 'from-them'})),
  ];
  // Deduplicate by ID
  const seen = new Set();
  const unique = allMsgs.filter(m => { if (seen.has(m.id)) return false; seen.add(m.id); return true; });
  unique.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));

  if (unique.length === 0) {
    container.innerHTML = '<div class="empty-state" style="flex:1;display:flex"><p>No messages yet. Send a message to start a conversation.</p></div>';
    return;
  }

  container.innerHTML = unique.map(m => `
    <div class="chat-msg ${m.dir}">
      <div class="chat-msg-meta">${m.dir === 'from-me' ? 'you' : esc(m.from)} · ${new Date(m.created_at).toLocaleTimeString()}</div>
      ${esc(m.body)}
    </div>
  `).join('');

  container.scrollTop = container.scrollHeight;
}

async function sendChat() {
  if (!currentPanel || currentPanel.type !== 'chat') return;
  const input = document.getElementById('chat-input');
  const body = input.value.trim();
  if (!body) return;
  input.value = '';

  await fetch('/api/messages', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({from: 'dashboard', to: currentPanel.agent, body}),
  });

  await loadChatMessages(currentPanel.agent);
}

async function duplicateTask(taskId) {
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;
  const clone = {
    title: task.title + ' (copy)',
    description: task.description || '',
    status: 'backlog',
    priority: task.priority,
    task_type: task.task_type || 'task',
    tags: task.tags || [],
    criteria: task.criteria || [],
  };
  if (task.project_id) clone.project_id = task.project_id;
  if (task.parent_id) clone.parent_id = task.parent_id;
  if (task.estimate) clone.estimate = task.estimate;
  const resp = await fetch('/api/tasks', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(clone),
  });
  if (resp.ok) {
    const created = await resp.json();
    showToast('Task duplicated', 'var(--green)');
    await fetchAll();
    openTaskPanel(created.id);
  }
}

async function deleteTask(taskId) {
  if (!confirm('Delete this task?')) return;
  const resp = await fetch(`/api/tasks/${taskId}`, {method: 'DELETE'});
  if (resp.status === 409) {
    alert('Cannot delete in-progress task. Unclaim it first.');
    return;
  }
  closePanel();
  await fetchAll();
}

async function submitCreateTask() {
  const title = document.getElementById('create-title').value.trim();
  if (!title) { alert('Title is required'); return; }

  const task = {title};
  const desc = document.getElementById('create-description').value.trim();
  if (desc) task.description = desc;
  task.task_type = document.getElementById('create-type').value;
  task.priority = document.getElementById('create-priority').value;

  const projectId = document.getElementById('create-project').value;

  const criteriaStr = document.getElementById('create-criteria').value.trim();

async function fetchAll() {
  try {
    const [tasksRes, agentsRes, statsRes, projectsRes, usageRes] = await Promise.all([
      fetch('/api/tasks'),
      fetch('/api/agents'),
      fetch('/api/stats'),
      fetch('/api/projects'),
      fetch('/api/usage'),
    ]);
    tasks = await tasksRes.json();
    agents = await agentsRes.json();
    stats = await statsRes.json();
    projects = await projectsRes.json();
    usageData = await usageRes.json();
    renderProjectNav();
    if (currentView === 'overview') {
      renderOverview();
    } else {
      renderBoardHeader();
      renderFilterBar();
      renderBoard();
      renderStats();
      renderUsage();
    }
    renderAgents();
    updatePageTitle();
    updateFavicon();
  } catch(e) {
    console.error('fetch error:', e);
  }
}

function renderProjectNav() {
  const container = document.getElementById('project-nav-list');
  const allCount = tasks.length;
  let html = `<button class="project-nav-item${currentView==='overview'?' active':''} overview-item" data-view="overview">
    <div class="nav-icon"></div>
    <span class="project-nav-name">Overview</span>
    <span class="project-nav-count">${allCount}</span>
  </button>`;

  for (const p of projects) {
    const count = tasks.filter(t => t.project_id === p.id).length;
    const pActiveAgents = agents.filter(a => a.project_id === p.id && a.status !== 'disconnected');
    const hasWorking = pActiveAgents.some(a => a.status === 'working');
    const hasActive = pActiveAgents.length > 0;
    const activityDot = hasWorking ? '<div class="project-nav-activity has-working"></div>' :
      hasActive ? '<div class="project-nav-activity has-active"></div>' : '';
    html += `<button class="project-nav-item${currentView===p.id?' active':''}" data-view="${esc(p.id)}">
      <div class="nav-icon"></div>
      <span class="project-nav-name">${esc(p.name)}</span>
      ${activityDot}
      <span class="project-nav-count">${count}</span>
    </button>`;
  }

  // Unassigned tasks
  const unassigned = tasks.filter(t => !t.project_id).length;
  if (unassigned > 0) {
    html += `<button class="project-nav-item${currentView==='none'?' active':''}" data-view="none">
      <div class="nav-icon" style="border:1px dashed var(--text-dim);background:none"></div>
      <span class="project-nav-name" style="font-style:italic">Unassigned</span>
      <span class="project-nav-count">${unassigned}</span>
    </button>`;
  }

  container.innerHTML = html;
  container.querySelectorAll('.project-nav-item').forEach(item => {
    item.addEventListener('click', () => navigateTo(item.dataset.view));
  });
}

function navigateTo(view) {
  currentView = view;
  localStorage.setItem('waggle_view', view);
  closePanel();

  const overviewEl = document.getElementById('overview-view');
  const boardEl = document.getElementById('board-view');

  if (view === 'overview') {
    selectedProject = '';
    overviewEl.style.display = '';
    boardEl.style.display = 'none';
    renderOverview();
  } else {
    selectedProject = view === 'none' ? 'none' : view;
    overviewEl.style.display = 'none';
    boardEl.style.display = '';
    renderBoardHeader();
    renderBoard();
    renderFilterBar();
    renderStats();
    renderUsage();
  }

  renderProjectNav();
  renderAgents();
}

function renderBoardHeader() {
  const el = document.getElementById('board-header');
  if (currentView === 'overview') { el.innerHTML = ''; return; }

  const project = currentView === 'none' ? null : projects.find(p => p.id === currentView);
  const name = project ? project.name : 'Unassigned Tasks';
  const desc = project && project.description ? project.description : '';
  const pAgents = project ? agents.filter(a => a.project_id === project.id && a.status !== 'disconnected') : [];
  const agentInfo = pAgents.length > 0 ? `<span style="font-size:0.7rem;color:var(--cyan);margin-left:8px">${pAgents.length} agent${pAgents.length !== 1 ? 's' : ''} active</span>` : '';

  el.innerHTML = `
    <div class="board-header-left">
      <span class="board-breadcrumb" onclick="navigateTo('overview')">Overview</span>
      <span class="board-project-name">${esc(name)}</span>
      ${agentInfo}
      ${desc ? `<span class="board-project-desc">${esc(desc)}</span>` : ''}
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-ghost btn-sm" onclick="openCreatePanel('task')">+ Task</button>
    </div>
  `;
}

function renderOverview() {
  const el = document.getElementById('overview-view');
  const totalTasks = tasks.length;
  const doneTasks = tasks.filter(t => t.status === 'done').length;
  const inProg = tasks.filter(t => t.status === 'in_progress').length;
  const activeAgents = agents.filter(a => a.status !== 'disconnected').length;
  const totalCost = usageData && usageData.total ? usageData.total.cost_usd : 0;

  // Build project cards
  let projectCards = '';
  for (const p of projects) {
    const pTasks = tasks.filter(t => t.project_id === p.id);
    const pDone = pTasks.filter(t => t.status === 'done').length;
    const pInProg = pTasks.filter(t => t.status === 'in_progress').length;
    const pBlocked = pTasks.filter(t => t.status === 'blocked').length;
    const pReady = pTasks.filter(t => t.status === 'ready').length;
    const pTotal = pTasks.length || 1;
    const pct = Math.round(pDone / pTotal * 100);
    const pAgents = agents.filter(a => a.project_id === p.id && a.status !== 'disconnected').length;

    projectCards += `
      <div class="project-card" data-project-id="${esc(p.id)}">
        <div class="project-card-accent"></div>
        <div class="project-card-name">${esc(p.name)}${pAgents > 0 ? ` <span style="font-size:0.6rem;color:var(--cyan)">${pAgents} agent${pAgents !== 1 ? 's' : ''}</span>` : ''}</div>
        ${p.description ? `<div class="project-card-desc">${esc(p.description)}</div>` : '<div class="project-card-desc" style="color:var(--border)">No description</div>'}
        <div class="project-card-stats">
          <div class="project-card-stat"><div class="dot" style="background:var(--amber)"></div>${pInProg} active</div>
          <div class="project-card-stat"><div class="dot" style="background:var(--blue)"></div>${pReady} ready</div>
          <div class="project-card-stat"><div class="dot" style="background:var(--red)"></div>${pBlocked} blocked</div>
          <div class="project-card-stat"><div class="dot" style="background:var(--green)"></div>${pDone} done</div>
        </div>
        <div class="project-card-progress">
          <div class="project-card-progress-fill" style="width:${pct}%;background:var(--green)"></div>
        </div>
      </div>`;
  }

  // Unassigned tasks card
  const unassigned = tasks.filter(t => !t.project_id);
  if (unassigned.length > 0) {
    const uDone = unassigned.filter(t => t.status === 'done').length;
    const uInProg = unassigned.filter(t => t.status === 'in_progress').length;
    projectCards += `
      <div class="project-card unassigned-card" data-project-id="none">
        <div class="project-card-name">Unassigned Tasks</div>
        <div class="project-card-desc">Tasks not assigned to any project</div>
        <div class="project-card-stats">
          <div class="project-card-stat"><div class="dot" style="background:var(--amber)"></div>${uInProg} active</div>
          <div class="project-card-stat"><div class="dot" style="background:var(--green)"></div>${uDone} done</div>
          <div class="project-card-stat" style="color:var(--text-dim)">${unassigned.length} total</div>
        </div>
      </div>`;
  }

  // Agent cards
  let agentCards = '';
  const sortedAgents = [...agents].sort((a, b) => {
    const rank = t => t.status === 'disconnected' ? 9 : t.type === 'alpha' ? 0 : t.type === 'leader' ? 1 : 2;
    return rank(a) - rank(b);
  });
  for (const a of sortedAgents) {
    const roleColor = {alpha:'var(--amber)',leader:'var(--purple)',subagent:'var(--cyan)'}[a.type] || 'var(--text-dim)';
    const taskCount = tasks.filter(t => t.assignee === a.name && t.status !== 'done').length;
    const ap = a.project_id ? projects.find(p => p.id === a.project_id) : null;
    agentCards += `
      <div class="overview-agent-card" data-agent-name="${esc(a.name)}">
        <div class="agent-status-dot ${a.status}"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:0.8rem;font-family:var(--font-sans);font-weight:500;color:var(--text-primary)">${esc(a.name)}
            <span style="font-size:0.55rem;color:${roleColor};font-weight:700;text-transform:uppercase">${a.type}</span>
          </div>
          <div style="font-size:0.65rem;color:var(--text-dim)">${a.current_task ? esc(a.current_task) : (ap ? esc(ap.name) : (a.last_seen ? timeSince(new Date(a.last_seen)) : ''))}</div>
        </div>
        ${taskCount > 0 ? `<span class="agent-workload has-tasks">${taskCount}</span>` : ''}
      </div>`;
  }

  el.innerHTML = `
    <div class="overview-header">
      <div>
        <div class="overview-title">All Projects</div>
        <div class="overview-subtitle">${totalTasks} tasks across ${projects.length} projects \u00b7 ${activeAgents} agents online${totalCost > 0 ? ` \u00b7 $${totalCost.toFixed(2)} spent` : ''}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-ghost btn-sm" onclick="openCreatePanel('project')">+ Project</button>
        <button class="btn" onclick="openCreatePanel('task')">+ Task</button>
      </div>
    </div>

    ${(() => {
      const now = new Date();
      const overdue = tasks.filter(t => t.deadline && t.status !== 'done' && new Date(t.deadline) < now);
      const blocked = tasks.filter(t => t.status === 'blocked');
      const staleAgents = agents.filter(a => a.status !== 'disconnected' && agentIsStale(a));
      if (overdue.length === 0 && blocked.length === 0 && staleAgents.length === 0) return '';
      return `<div class="overview-alerts">
        ${overdue.map(t => `<div class="overview-alert alert-overdue" data-task-id="${esc(t.id)}">
          <span style="color:var(--red);font-weight:600">OVERDUE</span> ${esc(t.title)}
          <span style="color:var(--text-dim);margin-left:auto;font-size:0.65rem">${Math.abs(Math.ceil((new Date(t.deadline) - now) / 86400000))}d overdue</span>
        </div>`).join('')}
        ${blocked.map(t => `<div class="overview-alert alert-blocked" data-task-id="${esc(t.id)}">
          <span style="color:var(--red)">BLOCKED</span> ${esc(t.title)}
          ${t.assignee ? `<span style="color:var(--cyan);margin-left:auto;font-size:0.65rem">${esc(t.assignee)}</span>` : ''}
        </div>`).join('')}
        ${staleAgents.map(a => `<div class="overview-alert alert-stale">
          <span style="color:var(--amber)">STALE</span> ${esc(a.name)} — no activity for ${timeSince(new Date(a.last_seen))}
        </div>`).join('')}
      </div>`;
    })()}

    <div>
      <div class="overview-section-title">Projects</div>
      <div class="overview-grid">${projectCards || '<div class="empty-state"><div class="empty-hex"></div><p>No projects yet. Create one to organize your work.</p></div>'}</div>
    </div>

    ${agents.length > 0 ? `<div>
      <div class="overview-section-title">Team</div>
      <div class="overview-agents">${agentCards}</div>
    </div>` : ''}

    <div>
      <div class="overview-section-title">Recent Activity</div>
      <div class="overview-activity" id="overview-activity"><div class="empty-state"><p>Loading...</p></div></div>
    </div>
  `;

  // Click handlers
  el.querySelectorAll('.project-card').forEach(card => {
    card.addEventListener('click', () => navigateTo(card.dataset.projectId));
  });
  el.querySelectorAll('.overview-agent-card').forEach(card => {
    card.addEventListener('click', () => openAgentPanel(null, card.dataset.agentName));
  });
  el.querySelectorAll('.overview-alert[data-task-id]').forEach(row => {
    row.addEventListener('click', () => {
      const t = tasks.find(x => x.id === row.dataset.taskId);
      if (t) openDetailPanel(null, t);
    });
  });

  // Fetch recent events
  fetch('/api/events?limit=20').then(r => r.json()).then(events => {
    const container = document.getElementById('overview-activity');
    if (!container) return;
    if (!events || events.length === 0) {
      container.innerHTML = '<div class="empty-state"><p>No recent activity</p></div>';
      return;
    }
    const typeColors = {
      task_created:'var(--green)',task_completed:'var(--green)',task_claimed:'var(--amber)',
      task_updated:'var(--blue)',task_deleted:'var(--red)',agent_joined:'var(--cyan)',
      agent_left:'var(--red)',message:'var(--purple)',agent_status_changed:'var(--cyan)',
    };
    container.innerHTML = events.slice(0, 15).map(evt => {
      const time = evt.timestamp ? timeSince(new Date(evt.timestamp)) : '';
      const label = (evt.type||'event').replace(/_/g, ' ');
      const color = typeColors[evt.type] || 'var(--text-dim)';
      let detail = '';
      if (evt.agent_id) detail += `<span style="color:var(--cyan)">${esc(evt.agent_id)}</span>`;
      if (evt.task_id) detail += (detail ? ' ' : '') + `<span style="color:var(--text-secondary)">${esc(evt.task_id)}</span>`;
      return `<div class="overview-activity-row${evt.task_id ? ' clickable' : ''}" ${evt.task_id ? `data-task-id="${esc(evt.task_id)}"` : ''}>
        <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${color};flex-shrink:0"></span>
        <span class="overview-activity-label">${label}</span>
        <span class="overview-activity-detail">${detail}</span>
        <span class="overview-activity-time">${time}</span>
      </div>`;
    }).join('');
    container.querySelectorAll('.overview-activity-row[data-task-id]').forEach(row => {
      row.addEventListener('click', () => openTaskPanel(row.dataset.taskId));
    });
  }).catch(() => {});
}

// ── SSE ──

function connectSSE() {
  const dot = document.getElementById('sse-dot');
  const label = document.getElementById('sse-label');
  const evtSource = new EventSource('/api/events');
  evtSource.onopen = () => { dot.className = 'sse-dot connected'; label.textContent = 'live'; };
  evtSource.onmessage = (e) => {
    try {
      const evt = JSON.parse(e.data);
      addEvent(evt);
      fetchAll();
      // Toast notification
      const toastColors = {
        task_created:'var(--green)',task_completed:'var(--green)',task_claimed:'var(--amber)',
        task_updated:'var(--blue)',task_deleted:'var(--red)',agent_registered:'var(--cyan)',
        agent_disconnected:'var(--red)',message_sent:'var(--purple)',
      };
      const toastMsgs = {
        task_created:'Task created',task_completed:'Task completed',task_claimed:'Task claimed',
        task_updated:'Task updated',task_deleted:'Task deleted',agent_registered:'Agent connected',
        agent_disconnected:'Agent disconnected',message_sent:'Message sent',
      };
      const label = toastMsgs[evt.type];
      if (label) {
        const detail = evt.task_id ? ` (${evt.task_id})` : (evt.agent_id ? ` — ${evt.agent_id}` : '');
        showToast(label + detail, toastColors[evt.type]);
      }
      // Refresh chat if agent panel is open with messages tab visible
      if (currentPanel && currentPanel.type === 'agent') {
        const msgTab = document.getElementById('agent-tab-messages');
        if (msgTab && msgTab.style.display !== 'none') loadChatMessages(currentPanel.agent);
      }
      if (currentPanel && currentPanel.type === 'chat') loadChatMessages(currentPanel.agent);
    } catch(err) {}
  };
  evtSource.onerror = () => {
    dot.className = 'sse-dot error';
    evtSource.close();
    let countdown = 3;
    label.innerHTML = `reconnecting <span class="sse-countdown">${countdown}s</span>`;
    const ticker = setInterval(() => {
      countdown--;
      if (countdown <= 0) { clearInterval(ticker); return; }
      label.innerHTML = `reconnecting <span class="sse-countdown">${countdown}s</span>`;
    }, 1000);
    setTimeout(() => { clearInterval(ticker); connectSSE(); }, 3000);
  };
}

// ── FILTER BAR ──

function renderFilterBar() {
  const bar = document.getElementById('filter-bar');
  const hasFilters = filterPriority || filterAssignee || filterType;

  // Get unique assignees from tasks
  const assignees = [...new Set(tasks.map(t => t.assignee).filter(Boolean))].sort();
  // Get unique types
  const types = [...new Set(tasks.map(t => t.task_type || 'task'))].sort();

  bar.innerHTML = `
    <div class="filter-group">
      <span class="filter-label">Priority</span>
      ${['critical','high','medium','low'].map(p =>
        `<button class="filter-chip${filterPriority===p?' active':''}" onclick="toggleFilter('priority','${p}')">${p}</button>`
      ).join('')}
    </div>
    <div class="filter-divider"></div>
    <div class="filter-group">
      <span class="filter-label">Type</span>
      ${types.map(t =>
        `<button class="filter-chip${filterType===t?' active':''}" onclick="toggleFilter('type','${t}')">${t}</button>`
      ).join('')}
    </div>
    ${assignees.length > 0 ? `
      <div class="filter-divider"></div>
      <div class="filter-group">
        <span class="filter-label">Assignee</span>
        <button class="filter-chip${filterAssignee==='_none'?' active':''}" onclick="toggleFilter('assignee','_none')">unassigned</button>
        ${assignees.map(a =>
          `<button class="filter-chip${filterAssignee===a?' active':''}" onclick="toggleFilter('assignee','${esc(a)}')">${esc(a)}</button>`
        ).join('')}
      </div>
    ` : ''}
    ${hasFilters ? `<div class="filter-divider"></div><button class="filter-clear" onclick="clearFilters()">clear filters</button>` : ''}
    <div class="filter-divider"></div>
    <div class="filter-group">
      <span class="filter-label">Sort</span>
      ${['priority','deadline','newest','oldest'].map(s =>
        `<button class="filter-chip${boardSort===s?' active':''}" onclick="setSort('${s}')">${s}</button>`
      ).join('')}
    </div>
  `;
}

function toggleFilter(type, val) {
  if (type === 'priority') filterPriority = filterPriority === val ? '' : val;
  else if (type === 'assignee') filterAssignee = filterAssignee === val ? '' : val;
  else if (type === 'type') filterType = filterType === val ? '' : val;
  renderFilterBar();
  renderBoard();
}

function clearFilters() {
  filterPriority = '';
  filterAssignee = '';
  filterType = '';
  renderFilterBar();
  renderBoard();
}

function setSort(s) {
  boardSort = s;
  localStorage.setItem('waggle_sort', s);
  renderFilterBar();
  renderBoard();
}

// ── TOAST NOTIFICATIONS ──

function showToast(message, color) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<div class="toast-dot" style="background:${color||'var(--text-dim)'}"></div>${esc(message)}`;
  container.appendChild(toast);
  setTimeout(() => { if (toast.parentElement) toast.remove(); }, 4000);
}

// ── SEARCH ──

let searchHighlight = -1;

function onSearch(query) {
  searchQuery = query;
  if (currentView !== 'overview') renderBoard();
  showSearchResults();
}

function handleSearchKey(e) {
  const results = document.getElementById('search-results');
  const items = results.querySelectorAll('.search-result');
  if (e.key === 'Escape') {
    e.target.blur(); e.target.value = ''; onSearch('');
    hideSearchResults();
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    searchHighlight = Math.min(searchHighlight + 1, items.length - 1);
    items.forEach((item, i) => item.classList.toggle('highlighted', i === searchHighlight));
  }
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    searchHighlight = Math.max(searchHighlight - 1, 0);
    items.forEach((item, i) => item.classList.toggle('highlighted', i === searchHighlight));
  }
  if (e.key === 'Enter' && searchHighlight >= 0 && items[searchHighlight]) {
    e.preventDefault();
    items[searchHighlight].click();
  }
}

function showSearchResults() {
  const q = (searchQuery || '').toLowerCase();
  const container = document.getElementById('search-results');
  if (!q || q.length < 2) { container.innerHTML = ''; container.classList.remove('visible'); return; }

  const matches = tasks.filter(t =>
    (t.title||'').toLowerCase().includes(q) ||
    (t.id||'').toLowerCase().includes(q) ||
    (t.assignee||'').toLowerCase().includes(q) ||
    (t.tags||[]).some(tag => tag.toLowerCase().includes(q))
  ).slice(0, 10);

  searchHighlight = -1;
  if (matches.length === 0) {
    container.innerHTML = '<div class="search-results-empty">No matching tasks</div>';
  } else {
    container.innerHTML = matches.map(t => {
      const proj = t.project_id ? projects.find(p => p.id === t.project_id) : null;
      const statusColors = {ready:'var(--blue)',in_progress:'var(--amber)',done:'var(--green)',blocked:'var(--red)',review:'var(--purple)',backlog:'var(--text-dim)'};
      return `<div class="search-result" data-task-id="${esc(t.id)}">
        <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${statusColors[t.status]||'var(--text-dim)'};flex-shrink:0"></span>
        <span class="search-result-title">${esc(t.title)}</span>
        <span class="search-result-meta">${proj ? esc(proj.name) : ''} ${t.assignee ? esc(t.assignee) : ''}</span>
      </div>`;
    }).join('');
  }
  container.classList.add('visible');
  container.querySelectorAll('.search-result').forEach(el => {
    el.addEventListener('click', () => {
      const taskId = el.dataset.taskId;
      hideSearchResults();
      document.getElementById('search-input').value = '';
      searchQuery = '';
      openTaskPanel(taskId);
    });
  });
}

function hideSearchResults() {
  document.getElementById('search-results').classList.remove('visible');
  searchHighlight = -1;
}

// ── INLINE ASSIGNEE EDIT ──

function editAssignee(taskId, current) {
  const agentNames = agents.map(a => a.name);
  const options = ['<option value="">Unassigned</option>',
    ...agentNames.map(n => `<option value="${esc(n)}"${n===current?' selected':''}>${esc(n)}</option>`),
  ].join('');
  const hasAgents = agentNames.length > 0;

  // Replace the editable span with an inline form
  event.stopPropagation();
  const span = event.target.closest('.editable-val');
  if (!span) return;
  const parent = span.parentElement;
  parent.innerHTML = `<div class="inline-edit">
    ${hasAgents ? `<select class="inline-edit-input" id="assignee-select">${options}</select>` :
      `<input class="inline-edit-input" id="assignee-input" value="${esc(current)}" placeholder="agent name">`}
    <button class="btn-sm" onclick="saveAssignee('${taskId}')">Save</button>
    <button class="btn-sm" onclick="openTaskPanel('${taskId}')">Cancel</button>
  </div>`;
  const el = document.getElementById('assignee-select') || document.getElementById('assignee-input');
  if (el) { el.focus(); el.addEventListener('keydown', e => { if(e.key==='Enter') saveAssignee(taskId); if(e.key==='Escape') openTaskPanel(taskId); }); }
}

function editProject(taskId, current) {
  event.stopPropagation();
  const span = event.target.closest('.editable-val');
  if (!span) return;
  const parent = span.parentElement;
  const options = ['<option value="">No project</option>',
    ...projects.map(p => `<option value="${p.id}"${p.id===current?' selected':''}>${esc(p.name)}</option>`),
  ].join('');
  parent.innerHTML = `<div class="inline-edit">
    <select class="inline-edit-input" id="project-select">${options}</select>
    <button class="btn-sm" onclick="saveProject('${taskId}')">Save</button>
    <button class="btn-sm" onclick="openTaskPanel('${taskId}')">Cancel</button>
  </div>`;
  const el = document.getElementById('project-select');
  if (el) { el.focus(); el.addEventListener('keydown', e => { if(e.key==='Enter') saveProject(taskId); if(e.key==='Escape') openTaskPanel(taskId); }); }
}

async function saveProject(taskId) {
  const sel = document.getElementById('project-select');
  const val = sel ? sel.value : '';
  await fetch(`/api/tasks/${taskId}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({project_id: val}),
  });
  await fetchAll();
  openTaskPanel(taskId);
}

async function editTitle(taskId) {
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;
  const titleEl = document.getElementById('panel-title');
  titleEl.innerHTML = `<input class="form-input" id="title-input" value="${esc(task.title)}" style="font-family:var(--font-sans);font-weight:600;font-size:1rem;width:100%">`;
  const input = document.getElementById('title-input');
  input.focus();
  input.select();
  input.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter') {
      const val = input.value.trim();
      if (val && val !== task.title) {
        await fetch(`/api/tasks/${taskId}`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({title: val}),
        });
        await fetchAll();
      }
      openTaskPanel(taskId);
    }
    if (e.key === 'Escape') openTaskPanel(taskId);
  });
  input.addEventListener('blur', () => openTaskPanel(taskId));
}

function editDescription(taskId) {
  document.getElementById('desc-display').style.display = 'none';
  document.getElementById('desc-edit').style.display = '';
  const ta = document.getElementById('desc-textarea');
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
}

function cancelEditDescription() {
  document.getElementById('desc-display').style.display = '';
  document.getElementById('desc-edit').style.display = 'none';
}

async function addTag(taskId) {
  const tag = prompt('Tag name:');
  if (!tag || !tag.trim()) return;
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;
  const newTags = [...(task.tags || []), tag.trim()];
  await fetch(`/api/tasks/${taskId}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({tags: newTags}),
  });
  await fetchAll();
  openTaskPanel(taskId);
}

async function removeTag(taskId, tag) {
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;
  const newTags = (task.tags || []).filter(t => t !== tag);
  await fetch(`/api/tasks/${taskId}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({tags: newTags}),
  });
  await fetchAll();
  openTaskPanel(taskId);
}

async function saveDescription(taskId) {
  const val = document.getElementById('desc-textarea').value;
  await fetch(`/api/tasks/${taskId}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({description: val}),
  });
  await fetchAll();
  openTaskPanel(taskId);
}

async function saveAssignee(taskId) {
  const sel = document.getElementById('assignee-select');
  const inp = document.getElementById('assignee-input');
  const val = sel ? sel.value : (inp ? inp.value.trim() : '');

    method: 'PATCH',

}

// ── KEYBOARD SHORTCUTS ──

document.addEventListener('keydown', e => {
  // Don't trigger shortcuts when typing in inputs
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  if (e.key === 'Escape') {
    if (document.getElementById('shortcuts-overlay').classList.contains('open')) { closeShortcuts(); return; }
    if (currentPanel) { closePanel(); return; }
    if (currentView !== 'overview') { navigateTo('overview'); return; }
    return;
  }
  if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    document.getElementById('search-input').focus();
    return;
  }
  if (e.key === 'n' && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    openCreatePanel('task');
    return;
  }
  if (e.key === 'p' && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    openCreatePanel('project');
    return;
  }
  if (e.key === '?') {
    e.preventDefault();
    openShortcuts();
    return;
  }
  if (e.key === 'r' && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    fetchAll();
    showToast('Refreshed', 'var(--blue)');
    return;
  }
  if (e.key === '[' && !e.ctrlKey && !e.metaKey) {
    e.preventDefault();
    toggleNav();
    return;
  }
  // Number keys 1-9 to jump to projects
  if (e.key >= '1' && e.key <= '9' && !e.ctrlKey && !e.metaKey) {
    const idx = parseInt(e.key) - 1;
    if (idx === 0) { navigateTo('overview'); return; }
    if (idx - 1 < projects.length) { navigateTo(projects[idx - 1].id); return; }
  }
});

// ── QUICK CLAIM ──

async function quickClaim(taskId) {
  if (agents.length === 0) return;
  const active = agents.filter(a => a.status !== 'disconnected');
  if (active.length === 0) { showToast('No active agents', 'var(--red)'); return; }
  if (active.length === 1) {
    await doClaimTask(taskId, active[0].name);
    return;
  }
  // Show a mini picker
  const names = active.map(a => a.name);
  const choice = prompt('Assign to which agent?\n\n' + names.map((n,i) => `${i+1}. ${n}`).join('\n') + '\n\nEnter name or number:');
  if (!choice) return;
  const name = /^\d+$/.test(choice.trim()) ? names[parseInt(choice.trim()) - 1] : choice.trim();
  if (!name || !names.includes(name)) {
    showToast('Unknown agent: ' + (name || '(empty)'), 'var(--red)');
    return;
  }
  await doClaimTask(taskId, name);
}

async function doClaimTask(taskId, agentName) {
  const resp = await fetch(`/api/tasks/${encodeURIComponent(taskId)}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({assignee: agentName, status: 'in_progress'}),
  });
  if (resp.ok) {
    showToast(`Assigned to ${agentName}`, 'var(--cyan)');
  } else {
    const err = await resp.json().catch(() => ({}));
    showToast('Error: ' + (err.error?.message || 'assign failed'), 'var(--red)');
  }
  await fetchAll();
}

// ── QUICK CREATE TASK ──

async function quickCreateTask(status) {
  const title = prompt('Task title:');
  if (!title || !title.trim()) return;
  const task = {title: title.trim(), status};
  if (selectedProject && selectedProject !== 'none') task.project_id = selectedProject;
  const resp = await fetch('/api/tasks', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(task),
  });
  if (resp.ok) {
    showToast('Task created', 'var(--green)');
    await fetchAll();
  } else {
    const err = await resp.json().catch(() => ({}));
    showToast('Error: ' + (err.error?.message || 'failed'), 'var(--red)');
  }
}

// ── NAV COLLAPSE ──

function toggleNav() {
  navCollapsed = !navCollapsed;
  localStorage.setItem('waggle_nav_collapsed', navCollapsed);
  document.querySelector('.app-shell').classList.toggle('nav-collapsed', navCollapsed);
  const btn = document.querySelector('.nav-collapse-btn');
  if (btn) btn.innerHTML = navCollapsed ? '&#9654;' : '&#9664;';
}

// ── COLUMN COLLAPSE ──

function toggleColumn(status) {
  if (collapsedColumns.has(status)) collapsedColumns.delete(status);
  else collapsedColumns.add(status);
  localStorage.setItem('waggle_collapsed', JSON.stringify([...collapsedColumns]));
  renderBoard();
}

// ── FAVICON BADGE ──

function updateFavicon() {
  const inProg = tasks.filter(t => t.status === 'in_progress').length;
  const canvas = document.createElement('canvas');
  canvas.width = 32; canvas.height = 32;
  const ctx = canvas.getContext('2d');
  // Draw hexagon
  ctx.fillStyle = '#f0a500';
  ctx.beginPath();
  const cx = 16, cy = 16, r = 14;
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 3) * i - Math.PI / 6;
    const x = cx + r * Math.cos(angle), y = cy + r * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath(); ctx.fill();
  // Draw count if > 0
  if (inProg > 0) {
    ctx.fillStyle = '#0a0a0c';
    ctx.font = 'bold 18px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(inProg > 9 ? '9+' : inProg.toString(), cx, cy + 1);
  } else {
    // Inner hex cutout
    ctx.fillStyle = '#0a0a0c';
    ctx.beginPath();
    const ri = 8;
    for (let i = 0; i < 6; i++) {
      const angle = (Math.PI / 3) * i - Math.PI / 6;
      const x = cx + ri * Math.cos(angle), y = cy + ri * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath(); ctx.fill();
  }
  // Apply as favicon
  let link = document.querySelector("link[rel='icon']");
  if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
  link.href = canvas.toDataURL('image/png');
}

// ── SHORTCUTS OVERLAY ──

function openShortcuts() {
  document.getElementById('shortcuts-overlay').classList.add('open');
}
function closeShortcuts() {
  document.getElementById('shortcuts-overlay').classList.remove('open');
}

// ── LIVE AGENT TIMESTAMPS ──

function tickAgentTimestamps() {
  document.querySelectorAll('.agent-row .agent-type').forEach(el => {
    const row = el.closest('.agent-row');
    if (!row) return;
    const agent = agents.find(a => a.name === row.dataset.agent);
    if (!agent || !agent.last_seen || agent.current_task) return;
    el.textContent = timeSince(new Date(agent.last_seen));
  });
}

// ── DYNAMIC PAGE TITLE ──

function updatePageTitle() {
  const inProg = tasks.filter(t => t.status === 'in_progress').length;
  const activeAgents = agents.filter(a => a.status !== 'disconnected').length;
  const parts = [];
  if (currentView !== 'overview') {
    const project = projects.find(p => p.id === currentView);
    if (project) parts.push(project.name);
    else if (currentView === 'none') parts.push('Unassigned');
  }
  if (inProg > 0) parts.push(`${inProg} active`);
  if (activeAgents > 0) parts.push(`${activeAgents} agents`);
  document.title = parts.length > 0 ? `waggle \u00b7 ${parts.join(' \u00b7 ')}` : 'waggle';
}

// ── UTILS ──

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── INIT ──

// Restore nav state
if (navCollapsed) {
  document.querySelector('.app-shell').classList.add('nav-collapsed');
  const btn = document.querySelector('.nav-collapse-btn');
  if (btn) btn.innerHTML = '&#9654;';
}
// Restore saved view
if (currentView !== 'overview') {
  selectedProject = currentView === 'none' ? 'none' : currentView;
  document.getElementById('overview-view').style.display = 'none';
  document.getElementById('board-view').style.display = '';
}
fetchAll();
connectSSE();
setInterval(fetchAll, 15000);
let tickInterval = setInterval(tickAgentTimestamps, 1000);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { clearInterval(tickInterval); tickInterval = null; }
  else if (!tickInterval) { tickInterval = setInterval(tickAgentTimestamps, 1000); fetchAll(); }
});
</script>
